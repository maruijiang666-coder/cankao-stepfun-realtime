<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stepfun Realtime VAD Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f7f9;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 { margin-top: 0; color: #333; }
        .controls { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .btn-primary { background-color: #007aff; color: white; }
        .btn-primary:hover { background-color: #0062cc; }
        .btn-danger { background-color: #ff3b30; color: white; }
        .btn-danger:hover { background-color: #d70015; }
        .btn-success { background-color: #34c759; color: white; }
        .btn-success:hover { background-color: #28a745; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }
        .status-connected { background-color: #e1f5fe; color: #01579b; }
        .status-disconnected { background-color: #ffebee; color: #b71c1c; }
        
        .ai-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 20px auto;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: all 0.3s;
        }
        .ai-speaking {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 154, 158, 0.6);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1.1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1.1); }
        }
        
        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
        }
        .log {
            margin-top: 20px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            font-size: 12px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #eee;
        }
        .transcript {
            margin-top: 10px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            font-size: 14px;
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .user-text { color: #007aff; font-weight: 500; }
        .ai-text { color: #34c759; font-weight: 500; }
        .transcript p { margin: 0; padding: 2px 0; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h1>Stepfun VAD</h1>
    
    <div class="ai-circle" id="aiCircle">AI</div>
    
    <div class="controls">
        <input type="password" id="apiKey" placeholder="Stepfun API Key">
        <div class="mode-selector" style="margin: 10px 0;">
            <label for="modeSelect">Mode: </label>
            <select id="modeSelect" class="btn" style="padding: 5px; border: 1px solid #ccc;">
                <option value="manual">Manual (Push to Talk)</option>
                <option value="vad">Voice Activity Detection</option>
            </select>
        </div>
        <button id="realtimeBtn" class="btn btn-success">Realtime Talk (One-Click)</button>
        <button id="connectBtn" class="btn btn-primary">Connect</button>
        
        <div id="manualControls" style="display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px;">
            <button id="pttBtn" class="btn" style="width: 100px; height: 100px; border-radius: 50%; background-color: #007aff; color: white; display: none; flex-direction: column; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none;">
                <span id="pttIcon">🎤</span>
                <span id="pttText" style="font-size: 12px; margin-top: 5px;">Hold to Speak</span>
            </button>
        </div>

        <button id="vadBtn" class="btn btn-primary" style="display: none;">Start VAD Mode</button>
        <button id="manualTriggerBtn" class="btn btn-success" disabled style="display: none;">Commit & Response</button>
    </div>
    
    <div id="status" class="status status-disconnected">Disconnected</div>
    
    <div class="transcript" id="transcript"></div>
    <div class="log" id="log"></div>
</div>

<script src="wav-stream-player.js"></script>
<script>
    const connectBtn = document.getElementById('connectBtn');
    const vadBtn = document.getElementById('vadBtn');
    const manualTriggerBtn = document.getElementById('manualTriggerBtn');
    const realtimeBtn = document.getElementById('realtimeBtn');
    const apiKeyInput = document.getElementById('apiKey');
    const statusDiv = document.getElementById('status');
    const aiCircle = document.getElementById('aiCircle');
    const logDiv = document.getElementById('log');
    const transcriptDiv = document.getElementById('transcript');
    const modeSelect = document.getElementById('modeSelect');
    const pttBtn = document.getElementById('pttBtn');
    const pttIcon = document.getElementById('pttIcon');
    const pttText = document.getElementById('pttText');

    let ws = null;
    let audioContext = null;
    let audioWorkletNode = null;
    let wavStreamPlayer = null;
    let microphoneStream = null;
    let isVADActive = false;
    let currentAiTranscriptSpan = null;
    let autoStartVAD = false;
    let conversationalMode = 'manual';
    let isRecording = false;
    let isProcessingRecording = false;

    function log(msg) {
        const p = document.createElement('p');
        p.style.margin = '2px 0';
        p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.prepend(p);
        console.log(msg);
    }

    function addTranscript(text, isAi = false) {
        if (isAi) {
            if (!currentAiTranscriptSpan) {
                const p = document.createElement('p');
                p.style.margin = '4px 0';
                const label = document.createElement('span');
                label.className = 'ai-text';
                label.textContent = 'AI: ';
                p.appendChild(label);
                
                currentAiTranscriptSpan = document.createElement('span');
                currentAiTranscriptSpan.className = 'ai-text';
                p.appendChild(currentAiTranscriptSpan);
                transcriptDiv.appendChild(p);
            }
            currentAiTranscriptSpan.textContent += text;
        } else {
            // User transcripts are usually completed in one go
            currentAiTranscriptSpan = null; // Reset AI span so next AI response starts fresh
            const p = document.createElement('p');
            p.style.margin = '4px 0';
            const span = document.createElement('span');
            span.className = 'user-text';
            span.textContent = "You: " + text;
            p.appendChild(span);
            transcriptDiv.appendChild(p);
        }
        transcriptDiv.scrollTop = transcriptDiv.scrollHeight;
    }

    async function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            await audioContext.audioWorklet.addModule('audio-processor.js');
        }
        if (audioContext.state === 'suspended') {
            await audioContext.resume();
        }
        if (!wavStreamPlayer) {
            wavStreamPlayer = new WavStreamPlayer({ sampleRate: 24000 });
            await wavStreamPlayer.connect();
        }
    }

    async function startRecording() {
        if (isProcessingRecording) return;
        isProcessingRecording = true;
        isRecording = true;
        
        try {
            interruptAudio(); // Always interrupt when starting to speak
            
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            if (!microphoneStream) {
                log("Initializing microphone...");
                microphoneStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(microphoneStream);
                audioWorkletNode = new AudioWorkletNode(audioContext, 'audio-processor');
                
                audioWorkletNode.port.onmessage = (event) => {
                    if (isRecording && ws && ws.readyState === WebSocket.OPEN) {
                        const pcmData = event.data;
                        const base64Audio = arrayBufferToBase64(pcmData.buffer);
                        ws.send(JSON.stringify({
                            type: 'input_audio_buffer.append',
                            audio: base64Audio
                        }));
                    }
                };
                
                source.connect(audioWorkletNode);
            }
            
            log("Recording active");
        } catch (err) {
            log("Error accessing microphone: " + err);
            isRecording = false;
        } finally {
            isProcessingRecording = false;
        }
    }

    function stopRecording(shouldCreateResponse = true) {
        if (isProcessingRecording) return;
        isProcessingRecording = true;
        isRecording = false;

        log("Recording paused");
        
        // If in manual mode, trigger response after stopping recording
        if (shouldCreateResponse && conversationalMode === 'manual' && ws && ws.readyState === WebSocket.OPEN) {
            log("PTT: Committing and requesting response...");
            // 1. Commit the buffer first
            ws.send(JSON.stringify({ type: 'input_audio_buffer.commit' }));
            // 2. Then create response
            ws.send(JSON.stringify({ type: 'response.create' }));
        }
        
        isProcessingRecording = false;
    }

    function arrayBufferToBase64(buffer) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        for (let i = 0; i < bytes.byteLength; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return window.btoa(binary);
    }

    function base64ToArrayBuffer(base64) {
        if (!base64 || typeof base64 !== 'string') {
            return new ArrayBuffer(0);
        }
        try {
            // Remove potential whitespace, newlines and fix padding
            const cleanedBase64 = base64.replace(/[\s\n\r]/g, '');
            const binaryString = window.atob(cleanedBase64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        } catch (e) {
            console.error("Base64 decode error:", e, base64 ? base64.substring(0, 20) + "..." : "null");
            return new ArrayBuffer(0);
        }
    }

    function playAudioChunk(base64Audio, trackId = 'default') {
        const arrayBuffer = base64ToArrayBuffer(base64Audio);
        if (arrayBuffer.byteLength === 0) return;
        
        console.log(`Playing audio chunk: ${arrayBuffer.byteLength} bytes`);
        wavStreamPlayer.add16BitPCM(arrayBuffer, trackId);
        aiCircle.classList.add('ai-speaking');
        
        // We can't easily know when the stream ends with WavStreamPlayer 
        // without complex tracking, but we can clear it on response.done or interruption.
    }

    function interruptAudio() {
        log("Interrupting audio playback...");
        if (wavStreamPlayer) {
            wavStreamPlayer.interrupt();
        }
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'response.cancel' }));
        }
        aiCircle.classList.remove('ai-speaking');
        currentAiTranscriptSpan = null; 
    }

    function updateSessionMode() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        
        conversationalMode = modeSelect.value;
        log(`Switching to ${conversationalMode} mode...`);

        const sessionConfig = {
            modalities: ["text", "audio"],
            input_audio_format: "pcm16",
            output_audio_format: "pcm16",
            input_audio_transcription: { model: 'whisper-1' },
            instructions: "你是一个有用的人工智能助手。请务必使用中文回答用户的问题，除非用户明确要求使用其他语言。保持回答简洁、友好且专业。"
        };

        if (conversationalMode === 'manual') {
            pttBtn.style.display = 'flex';
            vadBtn.style.display = 'none';
            stopRecording(false); // Don't trigger response when switching modes
            ws.send(JSON.stringify({
                type: 'session.update',
                session: {
                    ...sessionConfig,
                    turn_detection: null
                }
            }));
        } else {
            pttBtn.style.display = 'none';
            vadBtn.style.display = 'block';
            ws.send(JSON.stringify({
                type: 'session.update',
                session: {
                    ...sessionConfig,
                    turn_detection: { type: 'server_vad' }
                }
            }));
            // In VAD mode, we usually start recording immediately
            startRecording();
        }
    }

    modeSelect.onchange = updateSessionMode;

    // PTT Event Listeners
    pttBtn.onmousedown = (e) => {
        e.preventDefault();
        if (conversationalMode === 'manual') {
            pttBtn.style.backgroundColor = '#34c759';
            pttText.textContent = 'Recording...';
            startRecording();
        }
    };

    const handlePTTRelease = (e) => {
        e.preventDefault();
        if (conversationalMode === 'manual' && isRecording) {
            pttBtn.style.backgroundColor = '#007aff';
            pttText.textContent = 'Hold to Speak';
            stopRecording();
        }
    };

    pttBtn.onmouseup = handlePTTRelease;
    pttBtn.onmouseleave = handlePTTRelease;

    // Touch support for mobile
    pttBtn.ontouchstart = (e) => {
        e.preventDefault();
        if (conversationalMode === 'manual') {
            pttBtn.style.backgroundColor = '#34c759';
            pttText.textContent = 'Recording...';
            startRecording();
        }
    };
    pttBtn.ontouchend = handlePTTRelease;
    pttBtn.ontouchcancel = handlePTTRelease;

    async function toggleMode() {
        updateSessionMode();
    }

    async function connect() {
        if (ws) {
            ws.close();
            return;
        }

        const apiKey = apiKeyInput.value;
        if (!apiKey) {
            alert("Please enter Stepfun API Key");
            autoStartVAD = false; // Reset if failed
            return;
        }
        // const url = `ws://localhost:8080/ws?apiKey=${apiKey}`;
        // 远程服务器的连接地址
         const url = `wss://wanda.tangledup-ai.com/backend/ws?apiKey=${apiKey}`;
        
        ws = new WebSocket(url);
        
        ws.onopen = async () => {
            statusDiv.textContent = "Connected";
            statusDiv.className = "status status-connected";
            connectBtn.textContent = "Disconnect";
            realtimeBtn.textContent = "Stop Realtime Talk";
            realtimeBtn.className = "btn btn-danger";
            vadBtn.disabled = false;
            manualTriggerBtn.disabled = false;
            log("Connected to proxy server");
            await initAudio();

            // Initialize session based on selected mode
            updateSessionMode();

            if (autoStartVAD) {
                modeSelect.value = 'vad';
                await toggleMode();
                autoStartVAD = false;
            }
        };
        
        ws.onmessage = async (event) => {
            let data;
            try {
                if (event.data instanceof Blob) {
                    const text = await event.data.text();
                    data = JSON.parse(text);
                } else if (typeof event.data === 'string') {
                    data = JSON.parse(event.data);
                } else {
                    return;
                }
            } catch (e) {
                console.error("JSON parse error:", e);
                return;
            }
            
            // Handle audio deltas
            const isAudioDelta = data.type === 'response.audio.delta' || data.type === 'server.response.audio.delta';
            if (isAudioDelta && (data.delta || data.audio)) {
                const audioData = data.delta || data.audio;
                playAudioChunk(audioData, data.item_id);
            } 
            // Handle interruption
            else if (data.type === 'server.input_audio_buffer.speech_started' || data.type === 'input_audio_buffer.speech_started') {
                log("User started speaking (Interruption detected)");
                interruptAudio();
            } 
            // Handle AI transcripts
            else if (data.type === 'response.audio_transcript.delta' && data.delta) {
                addTranscript(data.delta, true);
            } 
            // Handle user transcripts (if enabled)
            else if (data.type === 'conversation.item.input_audio_transcription.completed') {
                addTranscript(data.transcript, false);
            }
            // Handle response completion
            else if (data.type === 'response.done') {
                log("Response finished");
                currentAiTranscriptSpan = null; // Reset for next response
                aiCircle.classList.remove('ai-speaking');
            }
            // Handle new response creation
            else if (data.type === 'response.created') {
                currentAiTranscriptSpan = null; // New response starts fresh
                log("Event: response.created");
            }
            // Handle errors
            else if (data.type === 'error') {
                const errMsg = data.message || (data.error && data.error.message) || "Unknown error";
                log("Server error: " + errMsg);
                if (data.error) log("Details: " + JSON.stringify(data.error));
            } 
            // Log session.created to see default config
            else if (data.type === 'session.created') {
                log("Session created. Default config: " + JSON.stringify(data.session));
            }
            // Log other interesting events
            else {
                const interestingEvents = [
                    'session.created',
                    'session.updated',
                    'response.created',
                    'response.output_item.added',
                    'conversation.item.created',
                    'response.audio.delta',
                    'server.response.audio.delta'
                ];
                if (interestingEvents.includes(data.type)) {
                    log("Event: " + data.type);
                }
            }
        };
        
        ws.onclose = () => {
            statusDiv.textContent = "Disconnected";
            statusDiv.className = "status status-disconnected";
            connectBtn.textContent = "Connect";
            realtimeBtn.textContent = "Realtime Talk (One-Click)";
            realtimeBtn.className = "btn btn-success";
            vadBtn.disabled = true;
            manualTriggerBtn.disabled = true;
            vadBtn.textContent = "Start VAD Mode";
            isVADActive = false;
            stopRecording(false); // Don't trigger response on disconnect
            cleanupMicrophone(); // Fully stop microphone on disconnect
            interruptAudio();
            ws = null;
            log("Disconnected from proxy server");
        };
    }

    function cleanupMicrophone() {
        if (microphoneStream) {
            log("Stopping microphone...");
            microphoneStream.getTracks().forEach(track => track.stop());
            microphoneStream = null;
        }
        if (audioWorkletNode) {
            audioWorkletNode.disconnect();
            audioWorkletNode = null;
        }
    }

    connectBtn.onclick = connect;

    realtimeBtn.onclick = async () => {
        if (ws) {
            // 1. Stop audio and recording immediately
            stopRecording(false); // Don't trigger response
            interruptAudio();
            // 2. Close WebSocket
            ws.close();
        } else {
            autoStartVAD = true;
            await connect();
        }
    };

    manualTriggerBtn.onclick = () => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        
        log("Manually triggering response...");
        // 1. Commit the current audio buffer
        ws.send(JSON.stringify({
            type: 'input_audio_buffer.commit'
        }));
        
        // 2. Request a response
        ws.send(JSON.stringify({
            type: 'response.create'
        }));
    };
</script>

</body>
</html>
